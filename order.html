<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Orders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans pb-20">

    <header class="bg-white p-3 shadow-sm flex justify-between items-center sticky top-0 z-50 border-b-2 border-red-600">
        <div class="flex items-center gap-3">
            <img src="images/logo aiqu.jpeg" alt="AiQu Logo" class="h-10 w-10 rounded-full border-2 border-yellow-400 shadow-sm object-cover">
            <span class="font-bold text-lg tracking-tight text-red-700">Ayam Gepuk AiQu</span>
        </div>
    </header>

    <main class="p-4">
        <div class="flex justify-between items-center gap-4 mb-4 mt-2">
            <h1 class="text-xl font-bold text-gray-900">Orders</h1>
            <div class="flex items-center gap-2">
            <div class="relative flex-grow sm:flex-grow-0 sm:w-64">
                <input type="text" id="searchInput" placeholder="Search order..." class="bg-gray-100 rounded-full py-2 px-4 pr-10 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 w-full transition-all">
                <i class="fa-solid fa-search absolute right-3 top-2.5 text-gray-400 text-sm"></i>
            </div>
            <div class="flex gap-2">
                <button onclick="openAddModal()" class="bg-red-600 text-white px-3 py-1.5 rounded-lg text-sm font-medium shadow-sm hover:bg-red-700">
                    <i class="fa-solid fa-plus mr-1"></i> Add Order
                </button>
            </div>
            </div>
        </div>

        <div id="orderTabs" class="flex justify-center space-x-6 border-b border-gray-200 mb-5 overflow-x-auto no-scrollbar">
            <button class="pb-2 border-b-2 border-gray-900 font-bold text-gray-900 whitespace-nowrap text-sm">All</button>
            <button class="pb-2 text-gray-400 font-medium whitespace-nowrap text-sm hover:text-red-600">Pending</button>
            <button class="pb-2 text-gray-400 font-medium whitespace-nowrap text-sm hover:text-red-600">Complete</button>
            <button class="pb-2 text-gray-400 font-medium whitespace-nowrap text-sm hover:text-red-600">Cancel</button>
        </div>

        <div id="ordersContainer" class="space-y-4">
            <p class="text-center text-gray-500 mt-10">Loading orders...</p>
        </div>

        <!-- ADD ORDER MODAL -->
        <div id="addOrderModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-[60] flex justify-center items-center p-4">
            <div class="bg-white rounded-xl w-full max-w-md p-6 border-t-4 border-red-600">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-lg text-gray-900">Add New Order</h2>
                    <button onclick="closeAddModal()" class="text-gray-500 hover:text-red-600"><i class="fa-solid fa-xmark text-xl"></i></button>
                </div>
                
                <form id="addOrderForm" onsubmit="submitNewOrder(event)" class="space-y-4 text-sm">
                    <div>
                        <label class="block font-medium text-gray-700 mb-1">Customer Name</label>
                        <input type="text" id="customer_name" required class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-1 focus:ring-red-500">
                    </div>                    
                    <div class="bg-red-50 p-3 rounded-lg border border-red-100">
                        <label class="block font-bold text-red-900 mb-2 text-xs uppercase tracking-wide">Add Items to Cart</label>
                        <div class="flex gap-2">
                            <select id="product_name" class="flex-1 border border-gray-300 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-1 focus:ring-red-500 text-sm">
                                <option value="" data-price="0">Select a product...</option>
                            </select>
                            <input type="number" id="item_qty" value="1" min="1" class="w-16 border border-gray-300 rounded-lg px-2 py-1.5 text-center focus:ring-1 focus:ring-red-500">
                            <button type="button" onclick="addToOrderList()" class="bg-red-600 text-white px-3 py-1.5 rounded-lg hover:bg-red-700 font-bold"><i class="fa-solid fa-plus"></i></button>
                        </div>
                    </div>

                    <ul id="orderItemsList" class="space-y-2 max-h-32 overflow-y-auto pr-1">
                    </ul>

                    <div class="flex gap-3 pt-3 border-t border-gray-100">
                        <div class="w-1/3">
                            <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wide">Total Items</label>
                            <input type="number" id="total_qty" required readonly class="w-full border border-transparent bg-gray-100 font-bold text-gray-900 rounded-lg px-3 py-2 cursor-not-allowed">
                        </div>
                        <div class="w-2/3">
                            <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wide">Grand Total (RM)</label>
                            <input type="number" id="total_price" step="0.01" required readonly class="w-full border border-transparent bg-yellow-50 text-yellow-700 font-bold rounded-lg px-3 py-2 cursor-not-allowed text-lg">
                        </div>
                    </div>

                    <div>
                        <label class="block font-medium text-gray-700 mb-1">Payment Method</label>
                        <select id="payment_method" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-1 focus:ring-red-500">
                            <option value="Cash">Cash</option>
                            <option value="Card">Card</option>
                            <option value="E-Wallet">E-Wallet</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="w-full bg-red-600 text-white font-bold py-2.5 rounded-lg mt-2 hover:bg-red-700 shadow-sm">Submit Complete Order</button>
                </form>
            </div>
        </div>
    </main>

    <nav class="bg-white border-t border-gray-200 fixed bottom-0 w-full flex justify-around p-3 pb-safe z-50">
        <a href="index.html" class="flex flex-col items-center text-gray-400 hover:text-red-600 transition-colors">
            <i class="fa-solid fa-house mb-1 text-lg"></i>
            <span class="text-[10px] font-medium">Home</span>
        </a>
        <a href="#" class="flex flex-col items-center text-red-600">
            <i class="fa-solid fa-clipboard-list mb-1 text-lg"></i>
            <span class="text-[10px] font-medium">Order</span>
        </a>
        <a href="menu.html" class="flex flex-col items-center text-gray-400 hover:text-red-600 transition-colors">
            <i class="fa-solid fa-utensils mb-1 text-lg"></i>
            <span class="text-[10px] font-medium">Menu</span>
        </a>
        <a href="setting.html" class="flex flex-col items-center text-gray-400 hover:text-red-600 transition-colors">
            <i class="fa-solid fa-gear mb-1 text-lg"></i>
            <span class="text-[10px] font-medium">Setting</span>
        </a>
    </nav>
    
    <script src="js/orders.js?v=2"></script>
</body>
</html>
