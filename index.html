<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Home</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans pb-20 relative">
    
    <!-- HEADER WITH LOGO -->
    <header class="bg-white p-3 shadow-sm flex justify-between items-center sticky top-0 z-50 border-b-2 border-red-600">
        <div class="flex items-center gap-3">
            <img src="images/logo aiqu.jpeg" alt="AiQu Logo" class="h-10 w-10 rounded-full border-2 border-yellow-400 shadow-sm object-cover">
            <span class="font-bold text-lg tracking-tight text-red-700">Ayam Gepuk AiQu</span>
        </div>
    </header>

    <main class="p-4 space-y-6">
        <div id="dashboardStats" class="grid grid-cols-2 gap-4">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 border-l-4 border-l-red-500">
                <p class="text-xs text-gray-500 mb-1 font-semibold uppercase tracking-wide">Total Menu</p>
                <p id="stat-menu" class="text-xl font-bold text-gray-900">0</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 border-l-4 border-l-yellow-500">
                <p class="text-xs text-gray-500 mb-1 font-semibold uppercase tracking-wide">Total Order</p>
                <p id="stat-orders" class="text-xl font-bold text-gray-900">0</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 border-l-4 border-l-red-500">
                <p class="text-xs text-gray-500 mb-1 font-semibold uppercase tracking-wide">Total Staff</p>
                <p id="stat-staff" class="text-xl font-bold text-gray-900">0</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 border-l-4 border-l-green-500">
                <p class="text-xs text-gray-500 mb-1 font-semibold uppercase tracking-wide">Total Revenue</p>
                <p class="text-xl font-bold text-green-600">RM<span id="stat-revenue">0.00</span></p>
            </div>
        </div>

        <div class="space-y-4">
            <div id="barChartContainer" class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                <h2 class="text-sm font-bold text-gray-800 mb-3 uppercase tracking-wide">Best Selling</h2>
                <canvas id="orderBarChart"></canvas>
            </div>
            
            <div id="doughnutChart" class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                <h2 class="text-sm font-bold text-gray-800 mb-3 uppercase tracking-wide">Order Overview</h2>
                <div class="relative h-40 w-full flex items-center justify-between px-2">
                    <div class="w-28 h-28 rounded-full donut-chart flex items-center justify-center shadow-inner">
                        <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center">
                            <span class="text-xs font-bold text-gray-500">Total</span>
                        </div>
                    </div>
                    <div id="statusLabels" class="flex flex-col gap-2 w-1/2">
                        <div class="flex items-center justify-between text-xs">
                            <div class="flex items-center gap-1.5">
                                <div class="w-2 h-2 rounded-full bg-red-500"></div>
                                <span class="text-gray-600 font-medium">Completed</span>
                            </div>
                            <span id="completeLabel" class="font-bold text-gray-800">0%</span>
                        </div>
                        <div class="flex items-center justify-between text-xs">
                            <div class="flex items-center gap-1.5">
                                <div class="w-2 h-2 rounded-full bg-yellow-500"></div>
                                <span class="text-gray-600 font-medium">Pending</span>
                            </div>
                            <span id="pendingLabel" class="font-bold text-gray-800">0%</span>
                        </div>
                        <div class="flex items-center justify-between text-xs">
                            <div class="flex items-center gap-1.5">
                                <div class="w-2 h-2 rounded-full bg-orange-500"></div>
                                <span class="text-gray-600 font-medium">Cancelled</span>
                            </div>
                            <span id="cancelLAbel" class="font-bold text-gray-800">0%</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- AI Chat Window -->
    <div id="aiChatBox" class="hidden fixed bottom-[145px] right-4 w-[calc(100%-2rem)] max-w-[320px] bg-white rounded-2xl shadow-2xl border border-gray-200 z-[60] overflow-hidden flex flex-col transition-all">
        <div class="bg-gradient-to-r from-red-600 to-yellow-500 p-3.5 flex justify-between items-center text-white">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-robot text-xl drop-shadow-sm"></i>
                <span class="font-bold text-sm drop-shadow-sm">AiQu Assistant</span>
            </div>
            <button onclick="toggleAiChat()" class="text-white hover:text-red-100 transition-colors"><i class="fa-solid fa-xmark text-lg"></i></button>
        </div>
        
        <div class="p-4 h-64 overflow-y-auto bg-gray-50 flex flex-col gap-3" id="chatMessages">
            <div class="bg-white border border-gray-200 text-gray-800 text-xs p-3 rounded-2xl rounded-tl-none self-start max-w-[85%] shadow-sm leading-relaxed">
                Hello! I'm your AiQu Assistant. How can I help you manage your restaurant today?
            </div>
        </div>
        
        <div class="p-3 border-t border-gray-100 bg-white flex gap-2 items-center">
            <input type="text" id="chatInput" placeholder="Ask me anything..." class="flex-1 border border-gray-300 rounded-full px-4 py-2 text-xs focus:outline-none focus:ring-1 focus:ring-red-500">
            
            <button onclick="sendChatMessage()" class="bg-red-600 text-white px-4 py-2 rounded-full font-bold text-xs hover:bg-red-700 shadow-sm transition-colors flex-shrink-0">
                Send
            </button>
            
        </div>
    </div>

    <!-- Floating AI Chat Button -->
    <button onclick="toggleAiChat()" class="fixed bottom-20 right-4 h-14 w-14 bg-red-600 text-white rounded-full shadow-[0_4px_15px_rgba(220,38,38,0.4)] hover:bg-red-700 hover:shadow-lg z-[60] flex items-center justify-center transition-transform hover:scale-105 border-2 border-yellow-400">
        <i class="fa-solid fa-robot text-2xl"></i>
    </button>

    <!-- Navigation -->
    <nav class="bg-white border-t border-gray-200 fixed bottom-0 w-full flex justify-around p-3 pb-safe z-50">
        <a href="#" class="flex flex-col items-center text-red-600">
            <i class="fa-solid fa-house mb-1 text-lg"></i>
            <span class="text-[10px] font-medium">Home</span>
        </a>
        <a href="order.html" class="flex flex-col items-center text-gray-400 hover:text-red-600 transition-colors">
            <i class="fa-solid fa-clipboard-list mb-1 text-lg"></i>
            <span class="text-[10px] font-medium">Order</span>
        </a>
        <a href="menu.html" class="flex flex-col items-center text-gray-400 hover:text-red-600 transition-colors">
            <i class="fa-solid fa-utensils mb-1 text-lg"></i>
            <span class="text-[10px] font-medium">Menu</span>
        </a>
        <a href="setting.html" class="flex flex-col items-center text-gray-400 hover:text-red-600 transition-colors">
            <i class="fa-solid fa-gear mb-1 text-lg"></i>
            <span class="text-[10px] font-medium">Setting</span>
        </a>
    </nav>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/script.js?v=4"></script>
</body>
</html>
